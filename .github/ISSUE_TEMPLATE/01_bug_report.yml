name: Bug report
description: Report incorrect refund decisions, provider-call safety bugs, or Python/TypeScript behavior drift
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Use this for behavior bugs: wrong approval/denial, provider called when it should not be, partial-refund balance issues, or Python/TypeScript drift.
  - type: dropdown
    id: runtime
    attributes:
      label: Where did you see this?
      options:
        - Python (pip / refund-guard)
        - TypeScript / Node (npm / @mattmessinger/refund-guard)
        - Both
        - Not sure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal code or steps to reproduce (optional)
      description: Policy YAML snippet, amounts, dates, etc.
