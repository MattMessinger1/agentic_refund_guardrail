name: Question
description: Ask whether refund-guard fits your agentic refund flow or how to wire it into your backend
title: "[question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [README](https://github.com/MattMessinger1/agentic_refund_guardrail#what-this-repo-does-for-you) and [agentic flow recipes](https://github.com/MattMessinger1/agentic_refund_guardrail/blob/main/docs/AGENTIC_REFUND_FLOWS.md) first. This template is best for fit, integration, policy, provider, or framework questions.
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language / runtime
      options:
        - Python
        - TypeScript / Node
        - Other / not sure
    validations:
      required: true
