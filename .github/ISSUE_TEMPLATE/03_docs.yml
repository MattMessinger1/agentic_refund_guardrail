name: Documentation fix
description: Report confusing positioning, unclear examples, stale wording, typos, or broken links
title: "[docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or confusing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or fix (optional)
