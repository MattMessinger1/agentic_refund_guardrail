name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest
      - name: Minimal Python example
        run: python examples/minimal-python/run.py

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/refund-guard-ts/package-lock.json
      - name: Install and test
        working-directory: packages/refund-guard-ts
        run: |
          npm ci
          npm test
          npm run build
      - name: Minimal TypeScript example
        working-directory: examples/minimal-ts
        run: |
          npm ci
          npm start
