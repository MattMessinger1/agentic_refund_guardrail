# Publish refund-guard to PyPI using OpenID Connect (no long-lived API token in the repo).
# You must register this workflow as a "trusted publisher" on PyPI once — see docs/PYPI_FIRST_TIME.md

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate PyPI release metadata
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="$GITHUB_REF_NAME"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Publish workflow must run from a release tag like v0.5.0, got '$TAG'." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          python scripts/release.py validate-current \
            --version "$VERSION" \
            --tag-state present \
            --pypi-unpublished

      - name: Install build
        run: python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
